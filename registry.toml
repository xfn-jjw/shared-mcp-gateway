# Shared MCP Gateway 宿主机直跑默认示例。
# 说明：
# 1. 下面内容是案例配置，用于展示宿主机直跑时的推荐结构。
# 2. 落地到你的环境时，只需要替换绝对路径、端口和下游 MCP 启动命令。
# 3. 更通用的复制模板请参考：templates/registry.template.toml

[listen]
# 网关监听地址。仅本机访问时建议保持 127.0.0.1。
host = "127.0.0.1"
# 网关监听端口。
port = 8787
# 对外暴露的 MCP HTTP 路径。
path = "/mcp"

[gateway]
# 网关名称，会显示给 MCP Client。
name = "shared-gateway"
# 聚合后工具名的命名空间分隔符，例如 mysql_db.ping_db。
namespace_separator = "."
# 当前示例以宿主机直跑场景为主。
description = "Shared MCP gateway for local development."

[clients.codex]
# 可选元信息：记录 Codex 配置文件位置，便于人工维护或后续脚本接入。
# 注意：当前项目不会自动写入该路径。
config_path = "~/.codex/config.toml"

[clients.opencode]
# 可选元信息：记录 OpenCode 配置文件位置。
config_path = "~/.config/opencode/opencode.jsonc"

[clients.openclaw]
# 可选元信息：记录 OpenClaw 配置文件位置。
config_path = "~/.openclaw/workspace/mcp.json"

[[servers]]
# mempalace：共享记忆 / 知识能力。
key = "mempalace"
enabled = true
namespace = "mempalace"
language = "Python"
description = "共享记忆与知识图谱能力，用于写入/检索长期记忆、关系事实、语义搜索与时间线查询。"
command = "/opt/mempalace/.venv/bin/python"
args = ["-m", "mempalace.mcp_server"]
env = { PYTHONPATH = "/opt/mempalace" }

[[servers]]
# mysql-db：MySQL 只读查询能力。
key = "mysql-db"
enabled = true
namespace = "mysql_db"
language = "Python"
description = "MySQL 只读查询能力，用于查看表结构、索引、数据记录，以及执行安全的 SELECT / SHOW / EXPLAIN。"
command = "/bin/bash"
args = ["-lc", "cd /opt/mcps/mysql-connector && ./.venv/bin/python server.py"]

[[servers]]
# obsidian-kb：Obsidian Vault 知识库读写能力。
key = "obsidian-kb"
enabled = true
namespace = "obsidian_kb"
language = "Python"
description = "Obsidian 知识库读写能力，用于搜索、读取、更新笔记，以及查看反向链接。"
command = "/bin/bash"
args = ["-lc", "cd /opt/mcps/obsidian-kb-connector && OBSIDIAN_VAULT_PATH=/opt/openclaw-workspace ./.venv/bin/python server.py"]

[[servers]]
# tencent-cls：腾讯云 CLS 日志检索能力。
key = "tencent-cls"
enabled = true
namespace = "tencent_cls"
language = "Python"
description = "腾讯云 CLS 日志检索能力，用于登录控制台并按 traceId 拉取完整日志，辅助排障。"
command = "/bin/bash"
args = ["-lc", "cd /opt/mcps/tencent-cls-connector && ./.venv/bin/python server.py"]

[[servers]]
# openspace：通用任务委派 / skill 搜索能力。
# 宿主机直跑时，推荐直接以 stdio 方式纳入 shared-gateway。
key = "openspace"
enabled = true
namespace = "openspace"
language = "Python"
description = "通用任务执行与技能编排能力，用于搜索技能、执行多步任务、演化并上传技能。"
command = "/opt/OpenSpace/.venv/bin/openspace-mcp"
args = []
env = { OPENSPACE_HOST_SKILL_DIRS = "/opt/openclaw-workspace/skills", OPENSPACE_WORKSPACE = "/opt/OpenSpace" }

[[servers]]
# chrome-devtools：通过官方 npm 包启动 Chrome DevTools MCP。
# 宿主机直跑时默认让它按需启动本机 Chrome，并使用临时 profile 隔离会话状态。
key = "chrome-devtools"
enabled = true
namespace = "chrome_devtools"
language = "Node.js"
description = "Chrome DevTools 浏览器调试与自动化能力，用于页面导航、截图、控制台/网络分析与性能追踪。"
command = "/bin/bash"
args = ["/opt/shared-mcp-gateway/scripts/run_chrome_devtools_mcp.sh"]
env = { CHROME_DEVTOOLS_ISOLATED = "true" }

[local_exceptions.shared_gateway]
# 当前由 shared-gateway 统一纳管的共享能力。
managed = ["mempalace", "mysql_db", "obsidian_kb", "tencent_cls", "openspace", "chrome_devtools"]
reason = "共享型 MCP 适合统一收口、统一日志与统一自检。"
