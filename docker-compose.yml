services:
  shared-mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shared-mcp-gateway
    restart: unless-stopped
    ports:
      # 暴露到宿主机所有网卡，便于同局域网机器通过 http://宿主机IP:8787 访问 dashboard / mcp。
      # 如需更严格的访问控制，建议配合宿主机防火墙或上层反向代理限制来源。
      - "8787:8787"
    environment:
      # 示例环境变量：按你的实际挂载路径调整。
      OBSIDIAN_VAULT_PATH: /workspace/openclaw-workspace
      PYTHONPATH: /workspace/mempalace
      # OpenSpace 依赖的 LLM / 社区凭证建议通过环境变量透传给容器。
      OPENSPACE_API_KEY: ${OPENSPACE_API_KEY:-}
      OPENSPACE_MODEL: ${OPENSPACE_MODEL:-}
      OPENSPACE_LLM_API_KEY: ${OPENSPACE_LLM_API_KEY:-}
      OPENSPACE_LLM_API_BASE: ${OPENSPACE_LLM_API_BASE:-}
      OPENSPACE_LLM_CONFIG: ${OPENSPACE_LLM_CONFIG:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Apifox MCP 认证与目标项目配置：token 必填，project_id 按项目级接入时必填。
      APIFOX_ACCESS_TOKEN: ${APIFOX_ACCESS_TOKEN:-}
      APIFOX_PROJECT_ID: ${APIFOX_PROJECT_ID:-}
      APIFOX_SITE_ID: ${APIFOX_SITE_ID:-}
      APIFOX_OAS: ${APIFOX_OAS:-}
      # 可选：私有化/自定义站点时覆盖 API Base URL；公有云通常留空即可。
      APIFOX_API_BASE_URL: ${APIFOX_API_BASE_URL:-}
      # Chrome DevTools MCP 默认连接宿主机 remote-debugging Chrome。
      # macOS Docker Desktop 可用 host.docker.internal；宿主机需先以 --remote-debugging-port=9222 启动 Chrome。
      CHROME_DEVTOOLS_BROWSER_URL: ${CHROME_DEVTOOLS_BROWSER_URL:-http://host.docker.internal:9222}
      CHROME_DEVTOOLS_WS_ENDPOINT: ${CHROME_DEVTOOLS_WS_ENDPOINT:-}
      CHROME_DEVTOOLS_WS_HEADERS: ${CHROME_DEVTOOLS_WS_HEADERS:-}
      CHROME_DEVTOOLS_EXECUTABLE_PATH: ${CHROME_DEVTOOLS_EXECUTABLE_PATH:-}
      CHROME_DEVTOOLS_CHANNEL: ${CHROME_DEVTOOLS_CHANNEL:-}
      CHROME_DEVTOOLS_VIEWPORT: ${CHROME_DEVTOOLS_VIEWPORT:-}
      CHROME_DEVTOOLS_HEADLESS: ${CHROME_DEVTOOLS_HEADLESS:-false}
      CHROME_DEVTOOLS_ISOLATED: ${CHROME_DEVTOOLS_ISOLATED:-false}
      CHROME_DEVTOOLS_SLIM: ${CHROME_DEVTOOLS_SLIM:-false}
      CHROME_DEVTOOLS_MCP_EXTRA_ARGS: ${CHROME_DEVTOOLS_MCP_EXTRA_ARGS:-}
      # Arthas MCP 默认从容器访问宿主机 Arthas HTTP API；更多线上/测试 profile 可写入 /workspace/mcps/arthas-connector/.env。
      ARTHAS_DEFAULT_PROFILE: ${ARTHAS_DEFAULT_PROFILE:-local}
      ARTHAS_LOCAL_MODE: ${ARTHAS_LOCAL_MODE:-direct}
      ARTHAS_LOCAL_BASE_URL: ${ARTHAS_LOCAL_BASE_URL:-http://host.docker.internal:8563}
      ARTHAS_LOCAL_7981_MODE: ${ARTHAS_LOCAL_7981_MODE:-direct}
      ARTHAS_LOCAL_7981_BASE_URL: ${ARTHAS_LOCAL_7981_BASE_URL:-http://host.docker.internal:8564}
      ARTHAS_LOCAL_TUNNEL_MODE: ${ARTHAS_LOCAL_TUNNEL_MODE:-tunnel}
      ARTHAS_LOCAL_TUNNEL_TUNNEL_BASE_URL: ${ARTHAS_LOCAL_TUNNEL_TUNNEL_BASE_URL:-http://host.docker.internal:8777}
      ARTHAS_LOCAL_TUNNEL_APP_NAME: ${ARTHAS_LOCAL_TUNNEL_APP_NAME:-local-test}
      ARTHAS_LOCAL_TUNNEL_AGENT_ID: ${ARTHAS_LOCAL_TUNNEL_AGENT_ID:-local-test_01}
      ARTHAS_ENABLE_LOCAL_ATTACH: ${ARTHAS_ENABLE_LOCAL_ATTACH:-false}
      ARTHAS_ENABLE_RISKY_COMMANDS: ${ARTHAS_ENABLE_RISKY_COMMANDS:-false}
      ARTHAS_ENABLE_CUSTOM_OGNL: ${ARTHAS_ENABLE_CUSTOM_OGNL:-false}
    volumes:
      # 挂载本机 MCP 源码目录，供容器内网关直接拉起下游 server.py。
      - /Users/jervis.jiang/jervis.jiang/mcps:/workspace/mcps:ro
      # 挂载 mempalace 源码，并通过 PYTHONPATH 暴露给容器内 Python。
      - /Users/jervis.jiang/jervis.jiang/mempalace:/workspace/mempalace:ro
      # OpenSpace 运行时会写 logs / .openspace，因此这里保持 rw。
      - /Users/jervis.jiang/jervis.jiang/OpenSpace:/workspace/OpenSpace:rw
      # Obsidian Vault 需要被下游 MCP 读写，保持 rw。
      - /Users/jervis.jiang/jervis.jiang/doc/Obsidian/tc:/workspace/openclaw-workspace:rw
      # 持久化 mempalace 数据，避免容器重建后丢失知识库状态。
      - /Users/jervis.jiang/.mempalace:/root/.mempalace:rw
      # 把 Codex 自带 skills 挂进容器，供 OpenSpace 自动注册。
      - /Users/jervis.jiang/.codex/skills:/workspace/codex-skills:ro
      # 把本地扩展 skills 一并挂入，避免容器内只看到系统 skills。
      - /Users/jervis.jiang/.local/share/agent-skills:/workspace/agent-skills:ro
      # 持久化 chroma 缓存，减少重建后的模型重复下载。
      - /Users/jervis.jiang/.cache/shared-mcp-gateway/chroma:/root/.cache/chroma:rw
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/healthz', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
