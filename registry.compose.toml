# Shared MCP Gateway 容器内运行默认示例。
# 说明：
# 1. 下面内容是案例配置，用于展示 Docker / Compose 场景下的推荐结构。
# 2. 落地到你的环境时，优先修改 volume 挂载和这里的容器内路径。
# 3. 更通用的复制模板请参考：templates/registry.compose.template.toml

[listen]
# 容器内通常监听 0.0.0.0，便于端口映射到宿主机。
host = "0.0.0.0"
port = 8787
path = "/mcp"

[gateway]
# 网关名称，会显示给客户端。
name = "shared-gateway"
# 聚合后工具名的命名空间分隔符。
namespace_separator = "."
# 当前示例以 Docker / Compose 场景为主。
description = "Shared MCP gateway for containerized deployment."

[[servers]]
# mempalace：容器内通过 PYTHONPATH 指向挂载目录。
# 注意：宿主机 ~/.mempalace/config.json 里常常写的是宿主机绝对路径，
# 例如 /Users/.../.mempalace/palace。该配置文件会被 volume 原样挂进容器，
# 若不覆盖，容器内会误读宿主机路径并报 "No palace found"。
key = "mempalace"
enabled = true
namespace = "mempalace"
language = "Python"
description = "共享记忆与知识图谱能力，用于写入/检索长期记忆、关系事实、语义搜索与时间线查询。"
command = "/usr/local/bin/python"
args = ["-m", "mempalace.mcp_server"]
env = { PYTHONPATH = "/workspace/mempalace", MEMPALACE_PALACE_PATH = "/root/.mempalace/palace" }

[[servers]]
# mysql-db：直接调用容器内挂载的 server.py。
key = "mysql-db"
enabled = true
namespace = "mysql_db"
language = "Python"
description = "MySQL 只读查询能力，用于查看表结构、索引、数据记录，以及执行安全的 SELECT / SHOW / EXPLAIN。"
command = "/usr/local/bin/python"
args = ["/workspace/mcps/mysql-connector/server.py"]

[[servers]]
# obsidian-kb：依赖外层 Compose 注入的 OBSIDIAN_VAULT_PATH 环境变量。
key = "obsidian-kb"
enabled = true
namespace = "obsidian_kb"
language = "Python"
description = "Obsidian 知识库读写能力，用于搜索、读取、更新笔记，以及查看反向链接。"
command = "/usr/local/bin/python"
args = ["/workspace/mcps/obsidian-kb-connector/server.py"]

[[servers]]
# tencent-cls：直接调用容器内挂载的 server.py。
key = "tencent-cls"
enabled = true
namespace = "tencent_cls"
language = "Python"
description = "腾讯云 CLS 日志检索能力，用于登录控制台并按 traceId 拉取完整日志，辅助排障。"
command = "/usr/local/bin/python"
args = ["/workspace/mcps/tencent-cls-connector/server.py"]

[[servers]]
# openspace：容器内通过挂载源码 + python -m 方式运行。
# 为了适配 headless 容器，默认关闭 gui / web，仅保留 shell、mcp、system。
# 当前 compose 只挂载 OpenClaw 工作区技能目录，避免引用容器内不存在的路径。
key = "openspace"
enabled = true
namespace = "openspace"
language = "Python"
description = "通用任务执行与技能编排能力，用于搜索技能、执行多步任务、演化并上传技能。"
command = "/usr/local/bin/python"
args = ["-m", "openspace.mcp_server"]
env = { PYTHONPATH = "/workspace/OpenSpace", OPENSPACE_HOST_SKILL_DIRS = "/workspace/openclaw-workspace/skills", OPENSPACE_WORKSPACE = "/workspace/OpenSpace", OPENSPACE_BACKEND_SCOPE = "shell,mcp,system" }

[[servers]]
# apifox：通过 npm 包启动官方 MCP Server。
# 支持三种接入方式：
# 1) APIFOX_PROJECT_ID：读取 Apifox 项目（需要 APIFOX_ACCESS_TOKEN）
# 2) APIFOX_SITE_ID：读取 Apifox 文档站点（公开/共享文档场景）
# 3) APIFOX_OAS：直接读取 OpenAPI/Swagger 文件或 URL
# 可选 APIFOX_API_BASE_URL 用于私有化部署。
key = "apifox"
enabled = true
namespace = "apifox"
language = "Node.js"
description = "Apifox 项目 MCP 能力，用于读取接口定义、目录、文档与调试相关上下文。"
command = "/bin/bash"
args = ["-lc", "set -e; APIFOX_ARGS=''; if [ -n \"$APIFOX_PROJECT_ID\" ]; then if [ -z \"$APIFOX_ACCESS_TOKEN\" ]; then echo 'APIFOX_ACCESS_TOKEN is required when APIFOX_PROJECT_ID is set' >&2; exit 1; fi; APIFOX_ARGS=\"--project-id=$APIFOX_PROJECT_ID\"; elif [ -n \"$APIFOX_SITE_ID\" ]; then APIFOX_ARGS=\"--site-id=$APIFOX_SITE_ID\"; elif [ -n \"$APIFOX_OAS\" ]; then APIFOX_ARGS=\"--oas=$APIFOX_OAS\"; else echo 'One of APIFOX_PROJECT_ID / APIFOX_SITE_ID / APIFOX_OAS is required for apifox MCP' >&2; exit 1; fi; exec npx -y apifox-mcp-server@latest $APIFOX_ARGS ${APIFOX_API_BASE_URL:+--apifox-api-base-url=\"$APIFOX_API_BASE_URL\"}"]

[local_exceptions.shared_gateway]
# 当前由 shared-gateway 统一纳管的共享能力。
managed = ["mempalace", "mysql_db", "obsidian_kb", "tencent_cls", "openspace", "apifox"]
reason = "共享型 MCP 适合统一收口、统一日志与统一自检。"
